services:
  redis-test:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 5
  mongo-test:
    image: mongo:6.0
    env_file: .env.test
    ports:
      - "${MONGODB_PORT}:27017"
    command: mongod --noauth
    healthcheck: 
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 1s
      timeout: 3s
      retries: 5
  cassandra-test:
    image: cassandra:4.1
    environment:
      - CASSANDRA_BROADCAST_ADDRESS=cassandra-test
      - CASSANDRA_START_RPC=false
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
      - CASSANDRA_ENABLE_USER_DEFINED_FUNCTIONS=true
    ports:
      - "${CASSANDRA_PORT}:${CASSANDRA_PORT}"
    volumes:
      - cassandra_data_test:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1"]
      start_period: 45s
      interval: 5s
      timeout: 10s
      retries: 24
    container_name: cassandra-test
  neo4j-test:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=none
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
    container_name: neo4j-test
  test-runner:
    image: golang:1.24
    working_dir: /workspace/autograder
    volumes:
      - .:/workspace
      - ${GO_TEST_GOMODCACHE_HOST}:/go/pkg/mod
      - ${GO_TEST_GOCACHE_HOST}:/root/.cache/go-build
    env_file: .env.test
    depends_on:
      redis-test:
        condition: service_healthy
      mongo-test:
        condition: service_healthy
      cassandra-test:
        condition: service_healthy
      neo4j-test:
        condition: service_healthy

volumes:
  cassandra_data_test: