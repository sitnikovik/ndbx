name: Tests

on:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'
      - name: Run unit tests
        run: |
          make unit-test
      - name: Run integration tests
        run: |
          make integration-test
      - name: Check coverage
        run: |
          source .github/ci.env
          make coverage-check
